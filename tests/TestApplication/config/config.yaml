imports:
    - { resource: "@WebgriffeSyliusActiveCampaignPlugin/config/app/config.yaml" }
    - { resource: "services_test.php" }

doctrine:
    orm:
        entity_managers:
            default:
                mappings:
                    TestApplication:
                        is_bundle: false
                        type: attribute
                        dir: '%kernel.project_dir%/../../../tests/TestApplication/src/Entity'
                        prefix: Tests\Webgriffe\SyliusActiveCampaignPlugin

sylius_channel:
    resources:
        channel:
            classes:
                model: Tests\Webgriffe\SyliusActiveCampaignPlugin\Entity\Channel\Channel
                repository: Tests\Webgriffe\SyliusActiveCampaignPlugin\Repository\ChannelRepository

sylius_customer:
    resources:
        customer:
            classes:
                model: Tests\Webgriffe\SyliusActiveCampaignPlugin\Entity\Customer\Customer
                repository: Tests\Webgriffe\SyliusActiveCampaignPlugin\Repository\CustomerRepository

sylius_order:
    resources:
        order:
            classes:
                model: Tests\Webgriffe\SyliusActiveCampaignPlugin\Entity\Order\Order
                repository: Tests\Webgriffe\SyliusActiveCampaignPlugin\Repository\OrderRepository

webgriffe_sylius_active_campaign:
    api_client:
        base_url: '%env(WEBGRIFFE_SYLIUS_ACTIVE_CAMPAIGN_PLUGIN_BASE_URL)%'
        key: '%env(WEBGRIFFE_SYLIUS_ACTIVE_CAMPAIGN_PLUGIN_KEY)%'
    mapper:
        ecommerce_order_product:
            image_type: 'main' # Type of the product image to send to ActiveCampaign. If none is specified or the type does not exist on current product then the first image will be used.
            image_filter: 'sylius_medium' # Liip filter to apply to the image. If none is specified then the original image will be used.
    resources:
        channel_customer:
            classes:
                model: Tests\Webgriffe\SyliusActiveCampaignPlugin\Entity\Customer\ChannelCustomer
    send_unpaid_orders: true

framework:
    messenger:
        transports:
            main: 'in-memory://'
